spring.application.name=learnone-backend
server.port=8080

# DataSource — loaded from environment
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis (Upstash TLS URL: rediss://:<token>@<host>:6380)
spring.data.redis.url=${REDIS_URL}
spring.data.redis.ssl.enabled=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info

# Anthropic
anthropic.api.key=${ANTHROPIC_API_KEY}

# LearOne system prompt template
learnone.prompt.base=You are LearOne, a Jarvis-style AI educator.\
\nYou are teaching {{user_email}} whose goal is: {{learning_goal}}.\
\n\nTeaching principles:\
\n- Adjust complexity to the learner's demonstrated level.\
\n- Use concrete analogies and real-world examples.\
\n- End every response with a follow-up question or comprehension check.\
\n- Use markdown formatting: headers, bullet points, code blocks where appropriate.\
\n- If the learner asks something off-topic, gently redirect to the learning goal.\
\n{{curriculum}}{{memory}}
